<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JJ's Concerts Archive</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <h1>JJ's Concerts Archive</h1>
      </div>
      <div class="hero-card">
        <div class="hero-stat" id="totalCount">0 concerts</div>
      </div>
    </header>

    <nav class="tabs" role="tablist" aria-label="Page sections">
      <button id="tabOnThisDay" class="tab active" type="button" role="tab" aria-selected="true" aria-controls="panelOnThisDay">On This Day You Saw</button>
      <button id="tabAllEvents" class="tab" type="button" role="tab" aria-selected="false" aria-controls="panelAllEvents">All Events / Search</button>
    </nav>

    <main>
      <section id="panelOnThisDay" class="panel section-panel active-section" role="tabpanel" aria-labelledby="tabOnThisDay">
        <div class="highlights-carousel">
          <div class="carousel-viewport" id="carouselViewport">
            <div class="carousel-track" id="carouselTrack">
              <div class="carousel-slide">
                <h2>On this day you saw...</h2>
                <div id="dayFeature" class="feature-list">Loading…</div>
              </div>
            </div>
          </div>
          <div class="carousel-dots" id="carouselDots"></div>
        </div>
      </section>

      <section id="panelAllEvents" class="panel results-panel section-panel" role="tabpanel" aria-labelledby="tabAllEvents" hidden>
        <div class="results-bar">
          <h2 id="resultsHeading">All events</h2>
          <div class="results-count" id="resultsCount">0 found</div>
        </div>

        <div class="search-filter-sticky">
          <div class="search-row search-row-inline">
            <input id="searchInput" type="search" placeholder="Search artist, venue, note, or year..." />
          </div>
          <div id="artistMessage" class="artist-message" aria-live="polite"></div>

          <div class="filter-grid compact-filters">
            <label>
              <span>Browse by year</span>
              <select id="yearFilter">
                <option value="all">All Years</option>
              </select>
            </label>
          </div>
        </div>

        <div id="results" class="results"></div>
      </section>
    </main>
  </div>
</body>
</html>
