<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JJ's Concerts Archive</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <h1>JJ's Concerts Archive</h1>
      </div>
      <div class="hero-card">
        <div class="hero-stat-label" id="heroStatLabel">total shows</div>
        <div class="hero-stat" id="totalCount">0</div>
      </div>
    </header>

    <div class="view-toggle-bar">
      <button class="view-toggle-btn active" id="toggleHighlights" type="button">Memories</button>
      <div class="view-toggle-track" id="toggleTrack">
        <div class="view-toggle-thumb" id="toggleThumb"></div>
      </div>
      <button class="view-toggle-btn" id="toggleEvents" type="button">Search the Archive</button>
    </div>

    <section class="panel" id="highlightsPanel">
      <div class="highlights-carousel">
        <button class="carousel-btn prev-btn" id="carouselPrev" type="button" aria-label="Previous feature">‹</button>

        <div class="carousel-viewport" id="carouselViewport">
          <div class="carousel-track" id="carouselTrack">
            <div class="carousel-slide">
              <h2>On this day you saw...</h2>
              <div id="dayFeature" class="feature-list">Loading…</div>
            </div>
            <div class="carousel-slide">
              <h2>On this week you saw...</h2>
              <div id="weekFeature" class="feature-list">Loading…</div>
            </div>
            <div class="carousel-slide">
              <h2>Upcoming Events</h2>
              <div id="upcomingFeature" class="feature-list">Loading…</div>
            </div>
          </div>
        </div>

        <button class="carousel-btn next-btn" id="carouselNext" type="button" aria-label="Next feature">›</button>
        <div class="carousel-dots" id="carouselDots"></div>
      </div>
    </section>

    <section class="panel stats-panel" id="statsPanel">
      <h2 class="stats-heading">Your Numbers</h2>
      <div class="stats-grid" id="statsGrid">
        <div class="stats-col">
          <div class="stats-col-title">Top 10 Artists</div>
          <ol class="stats-list" id="topArtistsList"></ol>
        </div>
        <div class="stats-col">
          <div class="stats-col-title">Top 10 Venues</div>
          <ol class="stats-list" id="topVenuesList"></ol>
        </div>
      </div>
    </section>

    <section class="panel results-panel" id="eventsPanel" style="display:none">
      <div class="results-bar">
        <h2 id="resultsHeading">All events</h2>
        <div class="results-bar-right">
          <div class="sort-toggle" id="sortToggle" role="group" aria-label="Sort order">
            <button class="sort-btn active" data-sort="newest" type="button">Newest</button>
            <button class="sort-btn" data-sort="oldest" type="button">Oldest</button>
            <button class="sort-btn" data-sort="az" type="button">A–Z</button>
          </div>
          <div class="results-count" id="resultsCount">0 found</div>
        </div>
      </div>

      <div class="search-filter-sticky">
        <div class="search-row search-row-inline">
          <div class="search-input-wrap">
            <input id="searchInput" type="search" placeholder="Search artist, venue, note, or year..." />
            <button type="button" class="search-clear-btn" id="searchClear" aria-label="Clear search" hidden>✕</button>
          </div>
        </div>
        <div id="artistMessage" class="artist-message" aria-live="polite"></div>
      </div>

      <div class="scrubber-section" id="scrubberSection">
        <div class="scrubber-axis-label">Year</div>
        <canvas id="scrubberCanvas" class="scrubber-canvas" height="80"></canvas>
        <div class="scrubber-footer">
          <span class="scrubber-active-label" id="scrubberLabel">All years</span>
          <button class="scrubber-reset-btn" id="scrubberReset" hidden type="button">Clear</button>
        </div>
      </div>

      <div id="results" class="results"></div>
    </section>
  </div>
</body>
</html>
